# reload config
unbind r
bind r source ~/.config/tmux/tmux.conf

# rebind prefix key
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# base config
set -g  default-terminal "tmux-256color"
set -ga terminal-overrides ",*:RGB"
set -g  set-clipboard on
set-option -g focus-events on

# split config
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# split navigation in vim-style (without prefix)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# window navigation without prefx
bind -n M-n next-window
bind -n M-p previous-window

# vim-style copying
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
unbind -T copy-mode-vi MouseDragEnd1Pane

# start numbering at 1
set -g base-index      1
set -g pane-base-index 1
set-option -g renumber-windows on
set-window-option -g pane-base-index 1

# include theme catppuccin
set -g @catppuccin_flavor              "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text         " #{pane_current_command}:#{b:pane_current_path}"
set -g @catppuccin_window_current_text " #{pane_current_command}:#{b:pane_current_path}"

run ~/.config/tmux/catppuccin/catppuccin.tmux

set -g status-right-length 100
set -g status-left-length  100
set -g status-left         ""
set -g status-right        "#{E:@catppuccin_status_application}"
set -ag status-right       "#{E:@catppuccin_status_session}"
